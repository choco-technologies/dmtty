; console@.ini - libsystemd unit template, instantiated once per tty device
; by the [class=tty] rule in console.rules.
;
; %i expands to the tty node's short name (e.g. "tty1"); %v expands to the
; user_value libsystemd_notify_device_added() was called with for it - the
; node's full absolute path, reported by dmtty's dmdrvi_path_ready DIF (see
; ../../../docs/configuration.md and dmsystem's docs/configuration.md).
;
; console itself is just a launcher (see ../README.md): it reads $DMOD_SHELL
; for the module to run and binds its stdin/stdout/stderr/stdlog to the path
; given as its own argument - hence args/stdin/stdout/stderr/stdlog all being
; %v here.
description=Console on %i
exec=console
args=%v
stdin=%v
stdout=%v
stderr=%v
stdlog=%v
type=oneshot

; No restart= here (defaults to "no"): console exits as soon as it has
; started $DMOD_SHELL - it does not wait for the shell to finish - so
; restart=always would race a fresh console/shell against the one still
; running on the same device. Re-attaching the device (or
; `service start console@<name>` by hand) starts a new session instead.
