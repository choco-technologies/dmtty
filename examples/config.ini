; Configuration file for DMTTY example
;
; This creates the main /dev/tty node. "backing" is optional: without it
; /dev/tty exists but is unbound until something points it at a real file
; (via dmtty_attach(), the DMTTY_HANDLER_NAME_DEVICE_AVAILABLE dmhaman event,
; or the dmtty_ioctl_cmd_set_backing_path ioctl).
[dmtty]
backing=/dev/dmuart1
echo=on
canonical=on
