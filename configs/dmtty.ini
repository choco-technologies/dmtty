; Default dmdevfs configuration for dmtty.
;
; Drop this file into dmdevfs's config directory (see dmod-boot) to create the
; main /dev/tty node at boot. It starts unbound (no backing file) with the
; usual echo+canonical defaults; while unbound it forwards to/from the raw
; kernel stdin/stdout (Dmod_ReadKernel/Dmod_WriteKernel) instead of going
; nowhere. Point it at a real device later via dmtty_attach(), the
; DMTTY_HANDLER_NAME_DEVICE_AVAILABLE dmhaman event, or the
; dmtty_ioctl_cmd_set_backing_path ioctl on an already-open handle.
;
; To bind /dev/tty to a device at boot instead, uncomment "backing" below.
[dmtty]
; driver order is set to 2, to be after fmc
driver_order=2
echo=on
canonical=on
